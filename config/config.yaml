data:
  # Indian banking and fintech stocks on NSE
  tickers:
    - "HDFCBANK.NS"      # HDFC Bank — largest private bank
    # - "ICICIBANK.NS"     # ICICI Bank — major private bank
    # - "AXISBANK.NS"      # Axis Bank — major private bank
    # - "KOTAKBANK.NS"     # Kotak Mahindra Bank
    # - "SBIN.NS"          # State Bank of India — largest PSU bank
    # - "BAJFINANCE.NS"    # Bajaj Finance — leading NBFC/Fintech
    # - "PAYTM.NS"         # Paytm — pure Fintech
    # - "HDFCLIFE.NS"      # HDFC Life Insurance

  # Indian market indices
  indices:
    - "^NSEI"            # Nifty 50
    - "^NSEBANK"         # Nifty Bank Index — most relevant for us

  period: "3y"           # 2 years of historical data
  interval: "1d"         # Daily data (more reliable for Indian stocks)
  
  # Indian market hours (IST)
  market_open: "09:15"
  market_close: "15:30"
  timezone: "Asia/Kolkata"

model:
  sarima:
    order: [1, 1, 1]              # p, d, q — starting point
    seasonal_order: [1, 1, 1, 5]  # P, D, Q, s (5 trading days/week)
  
  anomaly:
    warning_threshold: 2.0        # z-score for yellow alert
    critical_threshold: 3.0       # z-score for red alert

  evaluation:
    train_ratio: 0.8              # 80% train, 20% test
    walk_forward_steps: 30        # days per walk-forward window

app:
  refresh_interval: 86400         # Daily refresh (Indian market is daily)
  forecast_horizon: 30            # 30 trading days ahead
  
# Known Indian market events for anomaly validation
# These are ground truth anomalies we can verify our model against
